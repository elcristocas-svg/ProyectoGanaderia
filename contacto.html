<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Ganadería</title>
    <link rel="icon" type="image/webp" href="./imagenes/favicon2.webp">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header class="main-header">
        <div class="header-overlay">
            <h2>Contáctanos</h2>
            <nav class="nav-bar">
                <a href="index.html">Volver al Inicio</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="intro-section">
            <h2>Escríbenos tus dudas sobre Ganadería</h2>
            <form style="display: flex; flex-direction: column; max-width: 400px; gap: 10px; margin-top: 20px;">
                <label>Nombre:</label>
                <input type="text" placeholder="Nombre" required>
                <label>Mensaje o Consulta:</label>
                <textarea rows="5" placeholder="Escribe aquí tu mensaje..." required></textarea>
                <button type="submit" style="padding: 10px; cursor: pointer;">Enviar Mensaje</button>
            </form>
        </section>
    </main>

</body>
</html>
