<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Ganadería</title>
    <link rel="icon" type="image/webp" href="./imagenes/favicon2.webp">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <header class="main-header">
        <div class="header-overlay">
            <h2>Regístrate</h2>
            <nav class="nav-bar">
                <a href="index.html">Volver al Inicio</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="intro-section">
            <h2>Crea una nueva cuenta</h2>
            <form style="display: flex; flex-direction: column; max-width: 300px; gap: 10px; margin-top: 20px;">
                <label>Nombre Completo:</label>
                <input type="text" placeholder="Tu nombre" required>
                <label>Correo Electrónico:</label>
                <input type="email" placeholder="correo@ejemplo.com" required>
                <label>Contraseña:</label>
                <input type="password" placeholder="Crea una clave" required>
                <button type="submit" style="padding: 10px; cursor: pointer;">Registrarse</button>
            </form>
        </section>
    </main>

</body>
</html>
